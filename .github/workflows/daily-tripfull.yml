name: Daily Tripfull Briefing (fallback)

on:
  schedule:
    - cron: "40 23 * * *"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate and save tripfull briefing
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          TRIPFULL_APPS_SCRIPT_URL: ${{ secrets.TRIPFULL_APPS_SCRIPT_URL }}
          APPS_SCRIPT_TOKEN: ${{ secrets.APPS_SCRIPT_TOKEN }}
          TRIPFULL_DRIVE_PARENT_ID: ${{ secrets.TRIPFULL_DRIVE_PARENT_ID }}
        run: python generate_tripfull.py
